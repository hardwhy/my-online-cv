name: Validate PR

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validate-pr-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Lint and build apps
    runs-on: ubuntu-latest
    env:
      VITE_CV_URL: ${{ vars.VITE_CV_URL }}
      VITE_CONTACT_ENDPOINT: ${{ vars.VITE_CONTACT_ENDPOINT }}
      VITE_CONTENT_SOURCE: ${{ vars.VITE_CONTENT_SOURCE }}
      VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY }}
      VITE_DEFAULT_CV_TEMPLATE: ${{ vars.VITE_DEFAULT_CV_TEMPLATE }}
      VITE_PDF_API_URL: ${{ vars.VITE_PDF_API_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout service packages
        run: git clone --depth 1 https://github.com/hardwhy/my-online-cv-services.git ../web-cv-services

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint web
        run: npx nx lint web

      - name: Build web
        run: npx nx build web

      - name: Lint admin
        run: npm run lint:admin

      - name: Build admin
        run: npm run build:admin
