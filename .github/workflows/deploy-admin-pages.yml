name: Deploy Admin to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - apps/admin/**
      - packages/**
      - package.json
      - package-lock.json
      - nx.json
      - tsconfig.base.json
      - tailwind.config.ts
      - postcss.config.js
      - .github/workflows/deploy-admin-pages.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: admin-pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
    runs-on: ubuntu-latest
    env:
      VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY }}
      VITE_DEFAULT_CV_TEMPLATE: ${{ vars.VITE_DEFAULT_CV_TEMPLATE }}
      VITE_PDF_API_URL: ${{ vars.VITE_PDF_API_URL }}
      VITE_WEB_URL: ${{vars.VITE_WEB_URL}}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout service packages
        run: git clone --depth 1 https://github.com/hardwhy/my-online-cv-services.git ../web-cv-services

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install service package dependencies
        run: npm ci --include=dev
        working-directory: ../web-cv-services

      - name: Install dependencies
        run: npm ci

      - name: Lint admin
        run: npm run lint:admin

      - name: Build admin
        run: npm run build:admin

      - name: Publish admin artifact
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.ADMIN_PAGES_TOKEN }}
          external_repository: ${{ secrets.ADMIN_PAGES_REPOSITORY }}
          publish_branch: gh-pages
          publish_dir: dist/apps/admin
          force_orphan: true
