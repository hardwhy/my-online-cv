name: Deploy Admin to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - apps/admin/**
      - packages/**
      - package.json
      - package-lock.json
      - nx.json
      - tsconfig.base.json
      - tailwind.config.ts
      - postcss.config.js
      - .github/workflows/deploy-admin-pages.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: admin-pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint admin
        run: npm run lint:admin

      - name: Build admin
        run: npm run build:admin

      - name: Publish admin artifact
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.ADMIN_PAGES_TOKEN }}
          external_repository: ${{ secrets.ADMIN_PAGES_REPOSITORY }}
          publish_branch: gh-pages
          publish_dir: dist/apps/admin
          force_orphan: true
